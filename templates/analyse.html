<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Analyse Descriptive - Santé</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

<div class="container mt-4">
    <h2 class="text-center mb-4">Rapport d'Analyse Descriptive</h2>
    
    <div class="row text-center mb-5">
        <div class="col-md-4">
            <div class="card border-primary">
                <div class="card-body">
                    <h6>Total Consultations</h6>
                    <h3 id="total-count">-</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-success">
                <div class="card-body">
                    <h6>Température Moyenne</h6>
                    <h3 id="avg-temp">-</h3>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card border-info">
                <div class="card-body">
                    <h6>Symptôme le plus fréquent</h6>
                    <h3 id="common-symptom">-</h3>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6">
            <canvas id="genreChart"></canvas>
        </div>
        <div class="col-md-6">
            <canvas id="ageChart"></canvas>
        </div>
    </div>
</div>

<script>
    // Récupération des données depuis notre API Python
    fetch('/api/analyse')
        .then(response => response.json())
        .then(data => {
            if(data.message) return alert("Aucune donnée disponible");

            // Remplir les cartes
            document.getElementById('total-count').innerText = data.total_consultations;
            document.getElementById('avg-temp').innerText = data.temperature_moyenne + "°C";
            document.getElementById('common-symptom').innerText = data.symptome_dominant;

            // Exemple de graphique par Genre (Données simulées pour la structure)
            const ctx = document.getElementById('genreChart').getContext('2d');
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: ['Masculin', 'Féminin', 'Autre'],
                    datasets: [{
                        label: 'Répartition par Genre',
                        data: [data.repartition_genre.Masculin, data.repartition_genre.Féminin, data.repartition_genre.Autre],
                        backgroundColor: ['#36A2EB', '#FF6384', '#FFCE56']
                    }]
                }
            });
        });
</script>
</body>
</html>
