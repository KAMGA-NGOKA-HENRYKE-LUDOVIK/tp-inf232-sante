<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collecte de Données Santé</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h3 class="text-center">Formulaire de Santé</h3>
                </div>
                <div class="card-body">
                    <form action="/collecte" method="POST">
                        <div class="mb-3">
                            <label class="form-label">Âge</label>
                            <input type="number" name="age" class="form-content form-control" required min="0" max="120">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Genre</label>
                            <select name="genre" class="form-select" required>
                                <option value="Masculin">Masculin</option>
                                <option value="Féminin">Féminin</option>
                                <option value="Autre">Autre</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Symptôme Principal</label>
                            <input type="text" name="symptome" class="form-control" placeholder="Ex: Fièvre, Toux..." required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Température (°C)</label>
                            <input type="number" step="0.1" name="temperature" class="form-control" placeholder="37.5" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ville</label>
                            <input type="text" name="ville" class="form-control" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100">Envoyer les données</button>
                    </form>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="/dashboard">Voir l'Analyse Descriptive →</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
